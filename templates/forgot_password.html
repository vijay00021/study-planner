{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Study Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo"><i class="fa-solid fa-layer-group"></i></div>
            <h2>Reset Password</h2>
            <p>Enter your email to receive a reset link</p>
            
            {% if message %}
            <div style="background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: left; font-size: 0.875rem;">
                {{ message|safe }}
            </div>
            {% endif %}

            <form action="{% url 'forgot_password' %}" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="you@example.com">
                </div>
                <button type="submit" class="btn btn-primary">Send Reset Link</button>
            </form>
            
            <p style="margin-top: 1.5rem; font-size: 0.875rem;">
                Remembered it? <a href="{% url 'login_page' %}" style="color: var(--primary); font-weight: 500;">Back to Login</a>
            </p>
        </div>
    </div>
</body>
</html>
